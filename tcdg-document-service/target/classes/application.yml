server:
  port: 8085

spring:
  application:
    name: tcdg-document-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tcdg_document_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: document-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  bucket: tcdg-documents
  region: us-east-1

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

services:
  company-service-url: http://localhost:8082
  template-service-url: http://localhost:8084
